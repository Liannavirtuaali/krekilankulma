name: Deploy to Altervista

on:
  push:
    branches:
      - main
  workflow_dispatch:  # allow manual re-runs from GitHub Actions UI (e.g. after secret rotation or FTP timeout)

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy public/ to Altervista via FTP
        # Pinned to v4.3.4 tag for supply-chain safety (avoids mutable @v4 pointer).
        # TODO: replace with the exact commit SHA once verified:
        #   gh release view v4.3.4 --repo SamKirkland/FTP-Deploy-Action --json targetCommitish
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4  # v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps          # enforce encrypted transport (FTPS); if Altervista uses implicit TLS add: port: 990
          local-dir: ./public/
          # FTP root = /membri/tilli/ (user home). Web root subfolder = demotalli/.
          server-dir: /demotalli/
          exclude: |
            **/.git*
            **/.git*/**
            **/.planning/**
            **/database/**
            **/node_modules/**
            **/.github/**
            **/uploads/**
