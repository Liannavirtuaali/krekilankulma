; PHP-asetukset — vastaa Altervistan ympäristöä (PHP 8.2.31)
; Perustuu phpinfo()-dataan Altervistalta

; Virheiden näyttö (kehityksessä päälle; Altervistalla nämä pois)
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On

; Aikavyöhyke — sama kuin Altervistalla (date.timezone = Europe/Rome)
date.timezone = Europe/Rome

; Tiedostokoot — Altervistalla ei näy phpinfo:ssa, käytetään oletuksia
upload_max_filesize = 10M
post_max_size = 12M
max_file_uploads = 20

; Suoritusaika — Altervista: max_execution_time oletuksena 30, nostettu sovellukselle
max_execution_time = 60
max_input_time = 60
memory_limit = 256M

; Verkko — Altervistalla default_socket_timeout = 19
default_socket_timeout = 19

; Session-asetukset — Altervistan arvot phpinfo:sta
session.cookie_httponly = 1
session.use_strict_mode = 0
session.gc_maxlifetime = 1440
session.sid_bits_per_character = 4
session.sid_length = 32
session.use_only_cookies = 1
session.use_trans_sid = 0

; Merkistökoodaus — Altervistalla mbstring.internal_encoding = UTF-8
default_charset = "UTF-8"
mbstring.internal_encoding = UTF-8

; OPcache — Altervistalla päällä, JIT pois
opcache.enable = 1
opcache.jit = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 4000
